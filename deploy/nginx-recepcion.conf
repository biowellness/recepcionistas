# =============================================================================
# BioWellness · Recepción — nginx sirviendo el build estático de Vite
#
# Instalación (en la EC2):
#   1) npm run build:app                      → genera app/dist/
#   2) sudo cp deploy/nginx-recepcion.conf /etc/nginx/sites-available/recepcion
#   3) sudo ln -s /etc/nginx/sites-available/recepcion /etc/nginx/sites-enabled/
#   4) Ajustar `root` y las rutas de los certificados TLS (abajo) si difieren.
#   5) sudo nginx -t && sudo systemctl reload nginx
#   6) Apagar el proceso de Vite (dev/preview): ya no hace falta.
#
# Con estáticos NO existen ni el chequeo de allowedHosts ni el websocket de HMR.
# Cada actualización del front = git pull + npm run build:app (nginx no se toca).
# =============================================================================

# HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name recepcion.biowellness.ar;

    # Renovación de certificados Let's Encrypt (webroot), si se usa certbot:
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name recepcion.biowellness.ar;

    # --- TLS (ajustar a las rutas reales; con certbot suelen ser estas) ---
    ssl_certificate     /etc/letsencrypt/live/recepcion.biowellness.ar/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/recepcion.biowellness.ar/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # --- Build estático de Vite ---
    root /home/recepcionistas/app/dist;
    index index.html;

    # SPA: cualquier ruta desconocida cae en index.html (React maneja la vista).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Assets con hash en el nombre (index-XXXX.js/.css): cachear "para siempre".
    # Un build nuevo cambia el hash, así que nunca se sirve código viejo.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # El index.html NUNCA se cachea: es el que apunta al bundle vigente.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # --- Seguridad ---
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    # HSTS: activar recién cuando TLS esté estable en todos los subdominios.
    # add_header Strict-Transport-Security "max-age=31536000" always;

    # --- Compresión ---
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # La API vive en api.medplum.com.ar (CORS lo maneja Medplum): acá no se
    # proxya nada — este server sirve solo los estáticos del front.
}
